apiVersion: v1
kind: Namespace
metadata:
  name: evpn-localnet-test
---
apiVersion: v1
kind: Pod
metadata:
  name: test-localnet-w1
  namespace: evpn-localnet-test
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{"name": "evpn", "ips": ["192.170.1.10/24", "fd00::a:1/64"], "default-route": ["192.170.1.1"]}]'
spec:
  nodeName: WORKER_NODE_1
  containers:
  - name: test
    image: nicolaka/netshoot
    command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata:
  name: test-localnet-w2
  namespace: evpn-localnet-test
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{"name": "evpn", "ips": ["192.170.1.20/24", "fd00::a:2/64"], "default-route": ["192.170.1.1"]}]'
spec:
  nodeName: WORKER_NODE_2
  containers:
  - name: test
    image: nicolaka/netshoot
    command: ["sleep", "infinity"]
